<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSecOps Project</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-6 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">Welcome to DevSecOps Project!</h1>
            <p class="text-gray-600">A Flask application deployed with Kubernetes</p>
        </div>

        <!-- Info Card -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="mb-4">
                <p class="text-gray-700 mb-2">{{ message }}</p>
                <p class="text-sm text-gray-500"><strong>Version:</strong> {{ version }}</p>
            </div>
        </div>

        <!-- Endpoints Card -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-xl font-semibold text-gray-800 mb-4">Available Endpoints:</h3>
            <div class="space-y-2">
                <a href="/time" class="block bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition text-center">
                    📅 Check Current Time
                </a>
                <a href="/health" class="block bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition text-center">
                    ❤️ Health Check
                </a>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8">
            <p class="text-gray-500 text-sm">DevSecOps Project • Powered by Flask & Kubernetes</p>
        </div>
    </div>
</body>
</html>
